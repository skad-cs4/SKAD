<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard</title>

<style>

/* ===== BASE ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    background: #020617;
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 18px;
    font-size: 22px;
    background: #0f172a;
    border-bottom: 1px solid #1e293b;
}

/* SECTION */
.section {
    padding: 20px;
}

.section h3 {
    margin-bottom: 15px;
    color: #60a5fa;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #0f172a;
    border-radius: 12px;
    border: 1px solid #1e293b;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-body {
    padding: 12px;
}

.price {
    color: #60a5fa;
    margin: 5px 0;
}

.btn {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 6px;
}

.delete {
    background: #ef4444;
    color: white;
}

/* ORDER CARD */
.order-card {
    background: #0f172a;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #1e293b;
}

/* TOAST */
#toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0f172a;
    border: 1px solid #3b82f6;
    padding: 10px;
    display: none;
}

</style>
</head>

<body>

<div class="header">Seller Dashboard</div>

<!-- MY ITEMS -->
<div class="section">
    <h3>My Items</h3>
    <div class="grid" id="myItems"></div>
</div>

<!-- ORDERS -->
<div class="section">
    <h3>Orders Received</h3>
    <div class="grid" id="orders"></div>
</div>

<div id="toast"></div>

<script>

const URL = "https://juhoiuurglcyarecqccd.supabase.co";
const KEY = "sb_publishable_1OodfzUIF0amgWyqJxYbHQ_cCIYLaVj";

const sellerPhone = localStorage.getItem("sellerPhone");

/* ===== TOAST ===== */
function toast(msg){
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",2000);
}

/* ===== LOAD ITEMS ===== */
async function loadMyItems(){
    try {
        const res = await fetch(`${URL}/rest/v1/items?phone=eq.${sellerPhone}`,{
            headers:{
                apikey:KEY,
                Authorization:`Bearer ${KEY}`
            }
        });

        if(!res.ok) throw new Error("Failed to fetch items");

        const data = await res.json();
        const container = document.getElementById("myItems");

        container.innerHTML = "";

        if(!data || data.length === 0){
            container.innerHTML = "<p>No items uploaded</p>";
            return;
        }

        data.forEach(item=>{
            container.innerHTML += `
            <div class="card">
                <img src="${item.image}">
                <div class="card-body">
                    <h4>${item.title}</h4>
                    <p class="price">₹${item.price}</p>
                    <p>${item.branch}</p>
                    <button class="btn delete" onclick="deleteItem(${item.id})">Delete</button>
                </div>
            </div>`;
        });

    } catch (err){
        console.error(err);
        toast("Failed to load items ❌");
    }
}

/* ===== DELETE ITEM ===== */
async function deleteItem(id){
    try {
        const res = await fetch(`${URL}/rest/v1/items?id=eq.${id}`,{
            method:"DELETE",
            headers:{
                apikey:KEY,
                Authorization:`Bearer ${KEY}`
            }
        });

        if(!res.ok) throw new Error("Delete failed");

        toast("Item deleted 🗑️");
        loadMyItems();

    } catch (err){
        console.error(err);
        toast("Delete failed ❌");
    }
}

/* ===== LOAD ORDERS ===== */
async function loadOrders(){
    try {
        const res = await fetch(`${URL}/rest/v1/orders?seller_phone=eq.${sellerPhone}&order=created_at.desc`,{
            headers:{
                apikey:KEY,
                Authorization:`Bearer ${KEY}`
            }
        });

        if(!res.ok) throw new Error("Failed to fetch orders");

        const data = await res.json();
        const container = document.getElementById("orders");

        container.innerHTML = "";

        if(!data || data.length === 0){
            container.innerHTML = "<p>No orders yet</p>";
            return;
        }

        data.forEach(order=>{
            container.innerHTML += `
            <div class="order-card">
                <h4>${order.item_name}</h4>
                <p>₹${order.price}</p>

                <hr style="margin:8px 0;border-color:#1e293b;">

                <p><b>Buyer:</b> ${order.buyer_name}</p>
                <p><b>Phone:</b> ${order.buyer_phone}</p>
                <p><b>Branch/Sem:</b> ${order.buyer_branch}</p>
            </div>`;
        });

    } catch (err){
        console.error(err);
        toast("Failed to load orders ❌");
    }
}

/* ===== INIT ===== */
if(!sellerPhone){
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:40px;'>Upload an item first</h2>";
} else {
    loadMyItems();
    loadOrders();
}

</script>

</body>
</html>
