<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SKAD</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Times New Roman",serif;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* ================= VIDEO ================= */

#intro{

    position:fixed;

    top:0;
    left:0;

    width:100vw;
    height:100vh;

    object-fit:cover;

    background:black;

}

/* ================= POPUP ================= */

#popup{

    position:fixed;

    inset:0;

    display:none;

    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.25);

    z-index:100;

}

/* ================= PANEL ================= */

.popup-card{

    width:min(90%,900px);

    padding:50px 40px;

    border-radius:30px;

    background:linear-gradient(180deg,#a7e4ff,#d8f4ff);

    display:flex;

    justify-content:center;

    box-shadow:
    0 10px 40px rgba(0,0,0,.35);

}

/* ================= BUTTON ================= */

#startButton{

    padding:16px 80px;

    border:none;

    border-radius:60px;

    background:#fff;

    color:#000;

    font-size:22px;

    font-weight:bold;

    letter-spacing:1px;

    cursor:pointer;

    transition:.3s;

    box-shadow:
    0 0 15px #00c6ff,
    0 0 35px #00c6ff,
    0 0 70px #00c6ff;

}

#startButton:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 25px #00c6ff,
    0 0 60px #00c6ff,
    0 0 120px #00c6ff;

}

/* ================= MOBILE ================= */

@media(max-width:768px){

.popup-card{

    width:90%;

    padding:35px 20px;

}

#startButton{

    width:100%;

    padding:15px;

    font-size:18px;

}

}

</style>

</head>

<body>

<!-- INTRO VIDEO -->

<video
id="intro"
autoplay
muted
playsinline
preload="auto">

<source src="assets/LOGO/intro.mp4" type="video/mp4">

</video>

<!-- POPUP -->

<div id="popup">

    <div class="popup-card">

        <button id="startButton">
            GET STARTED
        </button>

    </div>

</div>

<script>

const video=document.getElementById("intro");
const popup=document.getElementById("popup");
const button=document.getElementById("startButton");

video.addEventListener("ended",()=>{

    popup.style.display="flex";

});

button.addEventListener("click",()=>{

    window.location.href="PAGES/signup.html";

});

</script>

</body>
</html>
